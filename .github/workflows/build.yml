name: Build & Publish OCI image + Live ISO

on:
  schedule:
    # Weekly Monday 08:00 UTC. Cold builds are multi-hour (BST + Rust);
    # daily isn't realistic until the artifact cache is consistently warm.
    - cron: '0 8 * * 1'
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore: ['*.md', 'LICENSE*']
  pull_request:
    branches: [main]
    paths-ignore: ['*.md', 'LICENSE*']
  workflow_dispatch:

permissions:
  contents: write       # GH Releases upload (tag pushes)
  packages: write       # GHCR push for image + BST artifact cache
  id-token: write       # OIDC for keyless cosign signing
  attestations: write   # Sigstore build-provenance attestations

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: ghcr.io/razorfinos-org/cosmic-build-meta

jobs:
  build_and_push:
    name: Build & Push ${{ matrix.variant }}
    runs-on: ubuntu-24.04
    timeout-minutes: 360

    strategy:
      fail-fast: false
      matrix:
        # Two image variants ship from this repo: the open-source GPU
        # variant (cosmic) and the NVIDIA proprietary one (cosmic-nvidia).
        # Both build from the same BST graph; only the image element +
        # bootc-defaults differ.
        variant: [cosmic, cosmic-nvidia]

    # Skip image rebuild on most PRs to save runner minutes; only run on:
    #   - non-PR events (push/cron/workflow_dispatch)
    #   - auto-track PRs (verifies upstream-source bumps build cleanly)
    #   - PRs explicitly labelled `build` (manual opt-in)
    if: >-
      github.event_name != 'pull_request' ||
      startsWith(github.head_ref, 'auto/track-') ||
      contains(github.event.pull_request.labels.*.name, 'build')

    outputs:
      pushed_cosmic: ${{ steps.publish.outputs.pushed_cosmic }}
      pushed_cosmic_nvidia: ${{ steps.publish.outputs.pushed_cosmic_nvidia }}

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space on runner
        # ubuntu-24.04 ships ~14 GB free; BST cache + podman storage
        # easily blow past that on cold builds. Frees ~30 GB by removing
        # Android SDK, .NET, GHC, Haskell tools, etc.
        uses: ublue-os/remove-unwanted-software@v9

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Determine push eligibility
        id: eligibility
        # PRs from forks have a read-only GITHUB_TOKEN -- push to GHCR
        # would fail. Build still runs (validates the change), push and
        # cache-write are skipped.
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] && \
             [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
            echo "can_push=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PR from fork; image push and cache-write disabled (read-only token)"
          else
            echo "can_push=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine image tags
        id: tags
        # Tags are now variant-prefixed (cosmic-nightly, cosmic-nvidia-nightly)
        # so both variants coexist in the same registry repo. PR builds get
        # a single :{variant}-pr-N tag; tag-push events get :{variant}-{ref}
        # plus :{variant}-stable; everything else gets :{variant}-nightly +
        # :{variant}-nightly.YYYYMMDD.
        run: |
          DATE=$(date -u +%Y%m%d)
          V="${{ matrix.variant }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "primary_tag=${V}-pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "additional_tags=" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            REF="${GITHUB_REF#refs/tags/}"
            echo "primary_tag=${V}-${REF}" >> "$GITHUB_OUTPUT"
            echo "additional_tags=${V}-stable" >> "$GITHUB_OUTPUT"
          else
            echo "primary_tag=${V}-nightly" >> "$GITHUB_OUTPUT"
            echo "additional_tags=${V}-nightly.${DATE}" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore BuildStream local cache
        # BuildStream/buildbox-casd has no OCI registry support -- artifact
        # caches speak Bazel Remote CAS gRPC, not OCI distribution-spec.
        # Until we stand up a real bst-artifact-server, rely on
        # actions/cache for ~/.cache/buildstream. Per-variant key so the
        # two matrix jobs don't fight over the same cache; stable restore-
        # key allows reuse across runs; new key per run writes back fresh
        # state. Cap is 10 GB per repo on github-hosted.
        uses: actions/cache@v4
        with:
          path: ~/.cache/buildstream
          key: bst-cache-${{ runner.arch }}-${{ matrix.variant }}-${{ github.run_id }}
          restore-keys: |
            bst-cache-${{ runner.arch }}-${{ matrix.variant }}-
            bst-cache-${{ runner.arch }}-

      - name: Build OCI image (${{ matrix.variant }})
        # `just build-variant <v>` = `bst build oci/<v>/image.bst` then
        # `just load-image-variant <v>` (skopeo + podman build --squash-all
        # to flatten layers for bootc 1.15 compatibility). COSMIC_IMAGE_TAG
        # gets the full variant-prefixed tag so the local podman tag
        # matches what we push to GHCR.
        env:
          COSMIC_IMAGE_TAG: ${{ steps.tags.outputs.primary_tag }}
          BST_FLAGS: '--no-interactive --on-error=continue'
        run: just build-variant ${{ matrix.variant }}

      - name: Build Live ISO (${{ matrix.variant }})
        # ISO comes from the same BST graph -- it's just another artifact
        # produced by `kind: script` element installer/live-image-<v>.bst
        # wrapping systemd-repart --offline. Output lands at
        # build/iso/<v>-stable-amd64.iso.
        env:
          BST_FLAGS: '--no-interactive --on-error=continue'
        run: just build-iso ${{ matrix.variant }}

      - name: Log in to GHCR
        if: steps.eligibility.outputs.can_push == 'true'
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GHCR
        id: push
        if: steps.eligibility.outputs.can_push == 'true'
        env:
          PRIMARY_TAG: ${{ steps.tags.outputs.primary_tag }}
          ADDITIONAL_TAGS: ${{ steps.tags.outputs.additional_tags }}
        run: |
          set -euo pipefail
          sudo podman push "${IMAGE_REGISTRY}:${PRIMARY_TAG}"
          for tag in ${ADDITIONAL_TAGS}; do
            sudo podman tag "${IMAGE_REGISTRY}:${PRIMARY_TAG}" "${IMAGE_REGISTRY}:${tag}"
            sudo podman push "${IMAGE_REGISTRY}:${tag}"
          done
          DIGEST=$(sudo podman inspect --format '{{ "{{.Digest}}" }}' "${IMAGE_REGISTRY}:${PRIMARY_TAG}")
          echo "pushed=true"   >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REGISTRY}@${DIGEST}" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        if: steps.push.outputs.pushed == 'true'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via Sigstore OIDC)
        if: steps.push.outputs.pushed == 'true'
        # No private key needed. Sigstore Fulcio CA issues a short-lived
        # cert tied to this workflow's GitHub OIDC identity. Verify with:
        #   cosign verify ${IMAGE_REGISTRY}:cosmic-nightly \
        #     --certificate-identity-regexp \
        #       'https://github.com/razorfinos-org/cosmic-build-meta/.github/workflows/build.yml@.+' \
        #     --certificate-oidc-issuer https://token.actions.githubusercontent.com
        run: cosign sign --yes "${{ steps.push.outputs.image_ref }}"

      - name: Sign Live ISO (keyless via Sigstore OIDC)
        if: steps.push.outputs.pushed == 'true'
        # Sign the ISO blob alongside its image. Verify with:
        #   cosign verify-blob --signature <sig> --certificate <cert> ...
        # cosign emits .sig + .cert files alongside the input.
        run: |
          set -euo pipefail
          ISO="build/iso/${{ matrix.variant }}-stable-amd64.iso"
          cosign sign-blob --yes \
              --output-signature "${ISO}.sig" \
              --output-certificate "${ISO}.cert" \
              "${ISO}"
          sha256sum "${ISO}" > "${ISO}.sha256"

      - name: Generate build provenance attestation
        if: steps.push.outputs.pushed == 'true'
        # SLSA build-provenance v1; verifiable via `cosign verify-attestation`
        # or `gh attestation verify`. Stored as a sibling artifact to the image.
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.IMAGE_REGISTRY }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Upload ISO as workflow artifact
        # Always upload the ISO (even when can_push=false on fork PRs)
        # so reviewers can download and smoke-test from the workflow run.
        # Tag-push uploads to GH Releases happen in the next step.
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ matrix.variant }}
          path: |
            build/iso/${{ matrix.variant }}-stable-amd64.iso
            build/iso/${{ matrix.variant }}-stable-amd64.iso.sha256
            build/iso/${{ matrix.variant }}-stable-amd64.iso.sig
            build/iso/${{ matrix.variant }}-stable-amd64.iso.cert
          retention-days: 90
          if-no-files-found: warn

      - name: Upload ISO to GitHub Release (tag push only)
        if: github.ref_type == 'tag' && steps.eligibility.outputs.can_push == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/iso/${{ matrix.variant }}-stable-amd64.iso
            build/iso/${{ matrix.variant }}-stable-amd64.iso.sha256
            build/iso/${{ matrix.variant }}-stable-amd64.iso.sig
            build/iso/${{ matrix.variant }}-stable-amd64.iso.cert
          # Don't override release body across matrix runs -- each
          # variant's upload is additive.
          append_body: false

      - name: Upload BST logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.variant }}
          path: ~/.cache/buildstream/logs/
          retention-days: 7
