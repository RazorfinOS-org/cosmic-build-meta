name: Track Sources

# Known wart: `bst source track` short-circuits when the resolved commit
# hash for an element doesn't change, even if upstream has cut a new
# annotated tag pointing to the same commit. System76 routinely re-tags
# unchanged COSMIC repos (cosmic-wallpapers, cosmic-idle, cosmic-panel,
# cosmic-randr, cosmic-settings-daemon, pop-launcher have all done this
# across the 1.0.7 -> 1.0.11 epoch series). The artifact is byte-
# identical, but the .bst `ref:` field keeps the older `epoch-X.Y.Z-...`
# describe string -- visible drift between elements of the same epoch.
#
# After this workflow opens its PR, manually scan for elements still
# pinned to an older epoch tag than the rest of the tree. For each one,
# verify the commit hash matches latest-tag's dereferenced commit
# (`git ls-remote --tags <repo> | grep '\^{}$'`); if so, hand-edit the
# `ref:` field to the new describe string. No rebuild -- BST keys
# artifacts on commit hash, not the human-readable describe string.
# A scripted version of this check would be a worthwhile follow-up.

on:
  schedule:
    # Monday and Thursday at 06:00 UTC (before build workflow)
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  track-elements:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Restore BuildStream cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/buildstream
        key: bst-cache-${{ runner.arch }}
        restore-keys: |
          bst-cache-${{ runner.arch }}

    - name: Track all COSMIC element sources
      run: BST_FLAGS="--no-interactive" just track-all

    - name: Check for changes
      id: check
      run: |
        if git diff --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create or update PR with updated refs
      if: steps.check.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        BRANCH="auto/track-sources"
        git fetch origin "$BRANCH" || true
        git checkout -b "$BRANCH"
        git add elements/
        git commit -m "chore: track upstream COSMIC sources"
        git push --force-with-lease -u origin "$BRANCH"
        EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
        if [ -n "$EXISTING_PR" ]; then
          gh pr edit "$EXISTING_PR" \
            --title "chore: track upstream COSMIC sources $(date +%Y-%m-%d)"
        else
          gh pr create \
            --title "chore: track upstream COSMIC sources $(date +%Y-%m-%d)" \
            --body "Automated source tracking update." \
            --base main
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  track-junctions:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Restore BuildStream cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/buildstream
        key: bst-cache-${{ runner.arch }}
        restore-keys: |
          bst-cache-${{ runner.arch }}

    - name: Track junction sources
      run: BST_FLAGS="--no-interactive" just track-junctions

    - name: Check for changes
      id: check
      run: |
        if git diff --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create or update PR with updated junction refs
      if: steps.check.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        BRANCH="auto/track-junctions"
        git fetch origin "$BRANCH" || true
        git checkout -b "$BRANCH"
        git add elements/
        git commit -m "chore: track freedesktop-sdk junction"
        git push --force-with-lease -u origin "$BRANCH"
        EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
        if [ -n "$EXISTING_PR" ]; then
          gh pr edit "$EXISTING_PR" \
            --title "chore: track freedesktop-sdk junction $(date +%Y-%m-%d)"
        else
          gh pr create \
            --title "chore: track freedesktop-sdk junction $(date +%Y-%m-%d)" \
            --body "Automated junction tracking update. Review before merging -- junction updates may require rebuild verification." \
            --base main
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
