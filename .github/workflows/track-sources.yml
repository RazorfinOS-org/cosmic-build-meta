name: Track Sources

# Known wart: `bst source track` short-circuits when the resolved commit
# hash for an element doesn't change, even if upstream has cut a new
# annotated tag pointing to the same commit. System76 routinely re-tags
# unchanged COSMIC repos (cosmic-wallpapers, cosmic-idle, cosmic-panel,
# cosmic-randr, cosmic-settings-daemon, pop-launcher have all done this
# across the 1.0.7 -> 1.0.12 epoch series). The artifact is byte-
# identical, but bst's git_repo plugin only fetches the tracked branch,
# so newly-published tags never reach the local mirror -- `git describe`
# then picks an older tag (the most recent one the stale mirror knows
# about, by tagger date), which makes the recorded `ref:` field appear
# to regress (e.g. epoch-1.0.11 -> epoch-1.0.9 on the same commit).
#
# Mitigations below:
#   * cache key rotates per run so a fresh mirror is saved every time
#   * post-restore step force-refreshes tags in every git_repo mirror
#   * post-track step fails the run if any element's epoch version goes
#     backwards on the same commit hash, surfacing a hand-fix prompt

on:
  schedule:
    # Monday and Thursday at 06:00 UTC (before build workflow)
    - cron: '0 6 * * 1,4'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  track-elements:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v4

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Restore BuildStream cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/buildstream
        key: bst-cache-${{ runner.arch }}-${{ github.run_id }}
        restore-keys: |
          bst-cache-${{ runner.arch }}-

    - name: Refresh tags in BST source mirrors
      run: |
        set -eu
        mirrors_dir="$HOME/.cache/buildstream/sources/git_repo"
        [ -d "$mirrors_dir" ] || { echo "no mirrors yet, skipping"; exit 0; }
        for mirror in "$mirrors_dir"/*.git; do
          [ -d "$mirror" ] || continue
          echo "refreshing tags in $(basename "$mirror")"
          git -C "$mirror" fetch --tags --force --prune --prune-tags origin \
            '+refs/tags/*:refs/tags/*' || true
        done

    - name: Capture pre-track refs
      run: |
        mkdir -p /tmp/track-sources
        grep -rhE '^  ref: epoch-' elements/core/ \
          > /tmp/track-sources/before.txt || true

    - name: Track all COSMIC element sources
      run: BST_FLAGS="--no-interactive" just track-all

    - name: Detect epoch regressions
      run: |
        set -eu
        fail=0
        while IFS= read -r line; do
          hash=$(printf '%s' "$line" | sed -nE 's/.*-g([0-9a-f]{40}).*/\1/p')
          new=$(printf '%s' "$line" | sed -nE 's/.*epoch-([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')
          [ -n "$hash" ] && [ -n "$new" ] || continue
          old=$(grep -F "$hash" /tmp/track-sources/before.txt 2>/dev/null \
            | sed -nE 's/.*epoch-([0-9]+\.[0-9]+\.[0-9]+).*/\1/p' \
            | head -1)
          [ -n "$old" ] || continue
          highest=$(printf '%s\n%s\n' "$old" "$new" | sort -V | tail -1)
          if [ "$highest" != "$new" ]; then
            echo "::error::Epoch regression at commit $hash: epoch-$old -> epoch-$new (same commit, older tag picked -- hand-edit the ref)"
            fail=1
          fi
        done < <(grep -rhE '^  ref: epoch-' elements/core/)
        exit $fail

    - name: Check for changes
      id: check
      run: |
        if git diff --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create or update PR with updated refs
      if: steps.check.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        BRANCH="auto/track-sources"
        git fetch origin "$BRANCH" || true
        git checkout -b "$BRANCH"
        git add elements/
        git commit -m "chore: track upstream COSMIC sources"
        git push --force-with-lease -u origin "$BRANCH"
        EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
        if [ -n "$EXISTING_PR" ]; then
          gh pr edit "$EXISTING_PR" \
            --title "chore: track upstream COSMIC sources $(date +%Y-%m-%d)"
        else
          gh pr create \
            --title "chore: track upstream COSMIC sources $(date +%Y-%m-%d)" \
            --body "Automated source tracking update." \
            --base main
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  track-junctions:
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
    - uses: actions/checkout@v4

    - name: Install just
      uses: extractions/setup-just@v2

    - name: Restore BuildStream cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/buildstream
        key: bst-cache-${{ runner.arch }}-${{ github.run_id }}
        restore-keys: |
          bst-cache-${{ runner.arch }}-

    - name: Track junction sources
      run: BST_FLAGS="--no-interactive" just track-junctions

    - name: Check for changes
      id: check
      run: |
        if git diff --quiet; then
          echo "changed=false" >> "$GITHUB_OUTPUT"
        else
          echo "changed=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Create or update PR with updated junction refs
      if: steps.check.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        BRANCH="auto/track-junctions"
        git fetch origin "$BRANCH" || true
        git checkout -b "$BRANCH"
        git add elements/
        git commit -m "chore: track freedesktop-sdk junction"
        git push --force-with-lease -u origin "$BRANCH"
        EXISTING_PR=$(gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number')
        if [ -n "$EXISTING_PR" ]; then
          gh pr edit "$EXISTING_PR" \
            --title "chore: track freedesktop-sdk junction $(date +%Y-%m-%d)"
        else
          gh pr create \
            --title "chore: track freedesktop-sdk junction $(date +%Y-%m-%d)" \
            --body "Automated junction tracking update. Review before merging -- junction updates may require rebuild verification." \
            --base main
        fi
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
