name: cosmic

min-version: 2.5

element-path: elements

(@):
  - include/aliases.yml

options:
  arch:
    type: arch
    description: Machine architecture
    variable: arch
    values:
      - aarch64
      - x86_64
      - riscv64

sandbox:
  build-arch: "%{arch}"

variables:
  (?):
    - arch == "x86_64":
        abi: "x86_64-linux-gnu"
        go-arch: "amd64"
    - arch == "aarch64":
        abi: "aarch64-linux-gnu"
        go-arch: "arm64"
    - arch == "riscv64":
        abi: "riscv64-linux-gnu"
        go-arch: "riscv64"

elements:
  manual:
    # All Rust elements use kind:manual. If a Rust element ever uses kind:make
    # or kind:autotools, these env vars must be added there too.
    environment:
      RUSTFLAGS: "-C link-arg=-fuse-ld=lld"
      PKG_CONFIG_PATH: "/usr/lib/pkgconfig:/usr/share/pkgconfig"
  meson:
    variables:
      meson-global: >-
        --buildtype=plain
        --wrap-mode=nodownload
  cmake:
    variables:
      cmake-global: >-
        -DCMAKE_BUILD_TYPE=RelWithDebInfo

plugins:
  - origin: junction
    junction: plugins/buildstream-plugins.bst
    elements:
      - autotools
      - meson
      - cmake
      - make
    sources:
      - patch

  - origin: local
    path: plugins/local/sources
    sources:
      - cargo2

  - origin: local
    path: plugins/local/elements
    elements:
      - collect_initial_scripts

  - origin: junction
    junction: plugins/buildstream-plugins-community.bst
    elements:
      - pyproject
    sources:
      - git_repo
      - patch_queue

sources:
  git_repo:
    config:
      ref-format: git-describe
  cargo2:
    config:
      vendor-dir: ".vendored"
      # Per-org mappings only exist where the upstream URL doesn't
      # match the alias path (kennylevinsen lives on sr.ht, not github).
      # The host-wide catch-alls below handle every other org so cargo2
      # never emits [unaliased-url] warnings for transitive git crates.
      # `mirrored_git_url()` picks the longest matching prefix, so the
      # specific rules still win where present.
      git-mirrors:
        https://github.com/kennylevinsen/: "srht:~kennylevinsen/"
        https://github.com/: "github:"
        https://gitlab.com/: "gitlab:"
        https://gitlab.freedesktop.org/: "freedesktop:"
        https://gitlab.gnome.org/: "gnome:"
        https://git.sr.ht/: "srht:"
