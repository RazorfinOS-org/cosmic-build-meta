# EFI System Partition for the Live ISO.
#
# Holds systemd-boot, the kernel + initramfs the live env boots from,
# and the loader config. UEFI-only; no BIOS/MBR fallback for v1.
[Partition]
Type=esp
Format=vfat
SizeMinBytes=512M
SizeMaxBytes=512M
CopyFiles=/efi:/

# loader.conf timeout matches gnome-build-meta's choice -- short enough
# that boot proceeds quickly, long enough to allow the user to pick an
# alternate entry (e.g. a debug shell) before default fires.
