# Root partition holding the Live env squashfs.
#
# Read-only at runtime: dmsquash-live in the initramfs mounts this
# partition, finds LiveOS/squashfs.img inside it, then layers a tmpfs
# overlay so the live session is writable. The OCI image payload
# (used by fisherman to install onto the user's target disk) lives
# alongside the squashfs in this same partition.
[Partition]
Type=root
Format=erofs
ReadOnly=yes
CopyFiles=/sysroot:/
# systemd-repart sizes partitions to *exactly* SizeMinBytes -- it does
# not auto-grow to fit CopyFiles= content. Without this, the partition
# is allocated at minimum (4K) and the build fails with "contents
# don't fit in partition".
#
# 16G accommodates the COSMIC sysroot (~5.6G post-EROFS) plus the
# pre-baked bootc-installer Flatpak + GNOME Platform 50 runtime
# (~1.5G via installer/installer-prebake.bst). The local OCI image
# bake (installer/oci-image-prebake-cosmic.bst) was removed in favor
# of pulling from ngcr.io at install time -- the live ISO no longer
# carries the 6.7G uncompressed OCI dir.
SizeMinBytes=16G
