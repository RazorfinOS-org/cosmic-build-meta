# Root partition: the EROFS live root. Boots the live env, and also
# carries the bootc OCI image baked at /usr/lib/bootc/install-source/main
# so cosmonaut-installer can install offline (no registry round-trip).
# Mesa and NVIDIA variants each bake their own OCI at the same path; one
# images.json points at it for both.
[Partition]
Type=root
Format=erofs
ReadOnly=yes
CopyFiles=/sysroot:/
# systemd-repart sizes partitions to *exactly* SizeMinBytes -- it does
# NOT auto-grow to fit CopyFiles= contents even with --size=auto on the
# disk image. mkfs.erofs runs to completion, then repart fails with
# "Partition's contents (...) don't fit in the partition (4K)" if no
# floor is set.
#
# 10G fits the current ~8.5G content (~5.6G live root + ~2.9G gzipped
# OCI bake at /usr/lib/bootc/install-source/main) with ~1.5G headroom.
# The OCI is gzip-compressed by oci/cosmic/install-source.bst's skopeo
# wrapper -- image.bst's published OCI uses `gzip: disabled`, which
# would bloat the EROFS by ~3.7G if staged directly. EROFS Compression=
# could shrink further (live root is uncompressed here) but isn't worth
# the build-time cost yet.
SizeMinBytes=10G
