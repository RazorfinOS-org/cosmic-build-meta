# Force-load filesystem-dependent kernel modules at live-env boot.
#
# FDSDK 25.08 ships kernel modules but builds them with no
# /usr/lib/modules/<kver>/modules.alias generated -- so the kernel's
# request_module() auto-load via crypto/<name> alias never resolves
# anything. btrfs requests `crc32c` for checksums; without the alias
# wired, mount fails with
#   BTRFS error: error allocating crc32c hash for checksum
#   open_ctree failed: -2
# and tuna-installer's fisherman aborts at the "Mounting filesystem"
# step. Force-loading the module by file basename here sidesteps the
# missing alias.
#
# Module name uses the FDSDK file basename (`crc32c-cryptoapi`, NOT
# the upstream-kernel canonical `crc32c-generic`) -- their build
# config emits the cryptoapi-suffixed variant.
#
# Real fix for v1.1: run `depmod -a -b /sysroot <kver>` in
# installer/live-image-*.bst (and oci/cosmic/image.bst) to generate
# modules.alias from MODULE_ALIAS() strings. Then auto-load works
# everywhere and this file becomes redundant. Deferred because depmod
# isn't currently in the build sandbox's PATH and adding kmod.bst as
# a build-dep needs verification.
crc32c-cryptoapi
