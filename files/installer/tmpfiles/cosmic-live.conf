# Materialise /home/cosmic-live at boot (owned by the cosmic-live
# system user from sysusers.d/cosmic-live.conf). Without this,
# `user@<UID>.service` fails for cosmic-live because systemd's user
# manager can't initialise XDG dirs against a non-existent home.
# That cascades into greetd.service hitting its restart limit and
# systemd logging "Failed to start Greeter daemon" -- the live env
# then sits at multi-user with no GUI.
#
# Mirror of files/oci/tmpfiles/cosmic-greeter.conf for the Live env's
# autologin user.
d /home/cosmic-live 0700 cosmic-live cosmic-live - -

# Pre-populate cosmic-comp's output state so the live session boots at
# 1680x1050 instead of QEMU's 640x480 EDID default. See
# /usr/share/cosmic-vm-defaults/outputs.ron header for rationale.
# 'C' copies only if destination doesn't exist, so user-initiated
# display-settings changes during the live session persist (until
# reboot -- the Live env's /var is a tmpfs overlay).
d /home/cosmic-live/.local                    0755 cosmic-live cosmic-live - -
d /home/cosmic-live/.local/state              0755 cosmic-live cosmic-live - -
d /home/cosmic-live/.local/state/cosmic-comp  0755 cosmic-live cosmic-live - -
C /home/cosmic-live/.local/state/cosmic-comp/outputs.ron 0644 cosmic-live cosmic-live - /usr/share/cosmic-vm-defaults/outputs.ron

# Skip the cosmic-initial-setup wizard for the live user.
# /etc/xdg/autostart/com.system76.CosmicInitialSetup.desktop fires for
# every COSMIC session unless ~/.config/cosmic-initial-setup-done
# exists. cosmic-greeter-config.bst pre-stages this marker in /etc/skel
# (so accountsservice's useradd -m -k copies it for new accounts), but
# cosmic-live's home is materialised by this very tmpfiles entry, not
# by useradd, so the skel never gets copied. Without the marker the
# live user lands in the OEM wizard before tuna-installer's autostart
# can fire -- and finishing the wizard exits the session entirely.
d /home/cosmic-live/.config 0755 cosmic-live cosmic-live - -
f /home/cosmic-live/.config/cosmic-initial-setup-done 0644 cosmic-live cosmic-live - -

# Redirect podman/fisherman scratch space to /tmp (a dedicated tmpfs
# at 50% of RAM ~ 8G on a 16G VM), away from /var which lives on the
# volatile-overlay's tmpfs upper layer (capped at ~25% of RAM ~ 4G,
# too small for the 6.6G uncompressed COSMIC OCI layer).
#
# Symptom: tuna-installer's fisherman backend does
#   mount --bind /var/fisherman-tmp /var/tmp
#   podman pull oci:/usr/share/cosmic-installer/images/cosmic.oci
# podman writes the unpacked layer through /var/tmp, fills the
# overlay's upper tmpfs, fails with
#   "no space left on device" writing /var/tmp/container_images_storage*
# Bind-mount follows symlinks, so making /var/fisherman-tmp a symlink
# to /tmp/fisherman-tmp routes the staging write to the bigger tmpfs.
#
# Same for /var/lib/containers (podman's permanent storage post-pull):
# the deployed layer would land back on overlay tmpfs even after a
# successful pull, so symlink it to /tmp too.
#
# `L+` forces the symlink even if the path already exists (it does --
# the EROFS lower has empty /var/lib/containers from FDSDK's runtime
# packaging). Plain `L` would no-op.
d /tmp/fisherman-tmp     0755 root root - -
L+ /var/fisherman-tmp    -    -    -    - /tmp/fisherman-tmp
# /var/lib/containers MUST be a real directory (mount point), NOT a
# symlink. fisherman runs `bootc install to-filesystem
# --experimental-unified-storage` which compares the in-container
# /var/lib/containers (bind-mounted from host) with the host's view via
# /proc/1/root//var/lib/containers. A symlink dereferences to
# /tmp/podman-storage on the host but that path doesn't resolve through
# the container's /proc/1/root view -- bootc errors with "No such file
# or directory". A real dir backed by the dedicated tmpfs (mount unit
# below) gives both paths the same inode and the comparison passes.
d /var/lib/containers    0755 root root - -
