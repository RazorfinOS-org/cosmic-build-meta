# Live session user. Autologin via greetd; passwordless sudo so the
# tuna-installer Flatpak (running as cosmic-live, calling fisherman
# via flatpak-spawn --host) can drive the privileged install pipeline
# without a password prompt.
#
# Only ever exists in the Live ISO image (oci/cosmic-live, oci/cosmic-nvidia-live).
# Installed systems do not ship this user; their first user is created
# by fisherman during install.
# Pin a system-range UID. files/oci/greetd/cosmic-initial-setup-wrapper
# guards the OOBE on `getent passwd` finding a UID in [1000, 65000).
# Letting sysusers auto-pick risks landing cosmic-live in that range
# and tripping the guard on installed systems if cosmic-live somehow
# leaked into the deployed root (it shouldn't, but defense in depth).
# 955 sits between cosmic-greeter (950) and cosmic-initial-setup (980).
#
# Home is /home/cosmic-live (NOT /var/lib/cosmic-live) so the
# flatpak'd tuna-installer can read its own cache on first install.
# Reason: tuna-installer's python writes the fisherman recipe + binary
# to $HOME/.cache/bootc-installer/ inside the sandbox, then
# `flatpak-spawn --host` invokes fisherman from the same path on the
# host. Those paths only line up when $HOME is under /home/* -- that's
# the only host tree flatpak's `--filesystem=home` (implicit with
# `--filesystem=host`) bind-mounts as-is into the sandbox. With a
# system-user home under /var/lib/, the sandbox sees an isolated
# (empty) /var/lib/cosmic-live/ and fisherman silently fails to find
# the binary on the host. Verified live 2026-05-03 via the debug
# shell -- the cache dir existed in two parallel places (sandboxed +
# host) and never converged.
u  cosmic-live  955  "COSMIC Live"  /home/cosmic-live  /usr/bin/bash
m  cosmic-live  wheel
m  cosmic-live  video
m  cosmic-live  input
m  cosmic-live  seat
