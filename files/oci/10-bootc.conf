# systemd-tmpfiles fragment that recreates the writable mountpoints
# bootc/ostree expect on a fresh deployment. Mirrors gnome-build-meta's
# 10-bootc.conf.
#
# Type Path           Mode UID  GID  Age Argument
d      /var/home      0755 root root -   -
d      /var/roothome  0700 root root -   -
d      /var/opt       0755 root root -   -
d      /var/mnt       0755 root root -   -
