# Materialise /var/lib/cosmic-initial-setup at boot (owned by the
# cosmic-initial-setup system user from sysusers.d). Same rationale as
# cosmic-greeter.conf: user@<UID>.service needs a real home directory
# to initialise XDG dirs against; otherwise greetd's initial_session
# fails to spawn the wizard.
d /var/lib/cosmic-initial-setup 0700 cosmic-initial-setup cosmic-initial-setup - -

# Pre-populate cosmic-comp's output state so the compositor boots at
# 1680x1050 instead of QEMU's 640x480 EDID default. Workaround for the
# smithay bug that prevents dynamic mode changes from being picked up
# after startup (see /usr/share/cosmic-vm-defaults/outputs.ron header).
# 'C' copies only if destination doesn't exist, so user-initiated
# display-settings changes persist across reboots.
d /var/lib/cosmic-initial-setup/.local                    0755 cosmic-initial-setup cosmic-initial-setup - -
d /var/lib/cosmic-initial-setup/.local/state              0755 cosmic-initial-setup cosmic-initial-setup - -
d /var/lib/cosmic-initial-setup/.local/state/cosmic-comp  0755 cosmic-initial-setup cosmic-initial-setup - -
C /var/lib/cosmic-initial-setup/.local/state/cosmic-comp/outputs.ron 0644 cosmic-initial-setup cosmic-initial-setup - /usr/share/cosmic-vm-defaults/outputs.ron
