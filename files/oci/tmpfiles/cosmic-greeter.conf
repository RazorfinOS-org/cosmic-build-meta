# Materialise /var/lib/cosmic-greeter at boot (owned by the
# cosmic-greeter system user from sysusers.d). Without this,
# `user@<UID>.service` fails for cosmic-greeter because systemd's user
# manager can't initialise XDG dirs against a non-existent home.
# That cascades into greetd.service hitting its restart limit.
d /var/lib/cosmic-greeter 0700 cosmic-greeter cosmic-greeter - -

# Mirror of the cosmic-initial-setup tmpfiles entry: pre-populate
# cosmic-comp's output state so the greeter session also boots at
# 1680x1050 in QEMU. See cosmic-initial-setup.conf and
# /usr/share/cosmic-vm-defaults/outputs.ron header for rationale.
d /var/lib/cosmic-greeter/.local                    0755 cosmic-greeter cosmic-greeter - -
d /var/lib/cosmic-greeter/.local/state              0755 cosmic-greeter cosmic-greeter - -
d /var/lib/cosmic-greeter/.local/state/cosmic-comp  0755 cosmic-greeter cosmic-greeter - -
C /var/lib/cosmic-greeter/.local/state/cosmic-comp/outputs.ron 0644 cosmic-greeter cosmic-greeter - /usr/share/cosmic-vm-defaults/outputs.ron
