# Read by ostree-prepare-root.service inside the initramfs.
# Required configuration for bootc-managed COSMIC images.
#
# composefs.enabled=yes  -> ostree composes a verity-protected,
#                           read-only root using composefs.
# sysroot.readonly=yes   -> /sysroot is mounted read-only after pivot.
#
# These two settings together are the canonical bootc layout.

[composefs]
enabled = yes

[sysroot]
readonly = yes
