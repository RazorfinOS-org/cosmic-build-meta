# Dedicated system user for cosmic-greeter. Created at image build
# time by `systemd-sysusers --root /layer` in oci/cosmic/image.bst.
# Pop!_OS uses the same name; matching it keeps PAM/seatd configs
# compatible with upstream cosmic-greeter expectations.
u  cosmic-greeter -  "COSMIC Greeter"  /var/lib/cosmic-greeter  /usr/sbin/nologin
m  cosmic-greeter video
m  cosmic-greeter input
m  cosmic-greeter seat
