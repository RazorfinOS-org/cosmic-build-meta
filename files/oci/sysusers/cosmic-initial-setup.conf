# Dedicated system user for cosmic-initial-setup. Created at image
# build time by `systemd-sysusers --root /layer` in oci/cosmic/image.bst.
#
# Mirrors upstream Pop!_OS Debian postinst:
#   adduser --system --force-badname --home /run/cosmic-initial-setup/
#           --no-create-home --shell /bin/bash cosmic-initial-setup
#
# WHY THIS USER MUST EXIST: cosmic-initial-setup's main.rs gates the
# user-creation page on `Passwd::current_user().name == "cosmic-initial-setup"`.
# Without this exact name, the wizard skips the create-user page
# entirely and the user gets stranded with no desktop account.
# The polkit rules installed by `just install` (res/20-cosmic-initial-setup.rules)
# also key off this exact username for accountsservice/hostnamed/timedated
# permissions.
u  cosmic-initial-setup -  "COSMIC Initial Setup"  /var/lib/cosmic-initial-setup  /bin/bash
m  cosmic-initial-setup video
m  cosmic-initial-setup input
m  cosmic-initial-setup seat
