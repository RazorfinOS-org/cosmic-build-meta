# systemd user-manager environment for the COSMIC bootc image.
#
# `systemd --user` reads this at session start and propagates the env
# to every user service it spawns -- crucially including
# xdg-desktop-portal.service (started early as a dbus-activated user
# service). The portal frontend reads XDG_CURRENT_DESKTOP at startup
# to decide which backend manifest in /usr/share/xdg-desktop-portal/portals/
# to load. Without this set BEFORE the portal starts, our cosmic.portal
# manifest is ignored and every org.freedesktop.portal.* call returns
# PortalNotFound -- which left libcosmic 1.0's Settings proxy unable
# to fetch color-scheme and broke form rendering in cosmic-initial-setup.
#
# Per-process exports in our greetd wrappers (cosmic-{greeter,initial-setup}-wrapper)
# only affect cosmic-comp and its children -- NOT the long-running user
# services that `systemd --user` already started. Setting it here covers
# both paths.
#
# This image is COSMIC-only, so making the value unconditional is fine.
XDG_CURRENT_DESKTOP=COSMIC
