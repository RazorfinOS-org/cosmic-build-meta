# NetworkManager privacy defaults. Each setting closes a passive
# fingerprinting channel that NM otherwise leaves wide open.
#
# wifi.scan-rand-mac-address (default in NM >= 1.4): randomize the
# MAC used for AP scans so a passive listener can't track the radio
# across coffee shops, conferences, airports.
#
# connection.stable-id: derives the MAC and DHCP client-id from a
# per-SSID + per-machine hash. Same network -> same address (so the
# router's reservations / captive portals keep working); different
# network -> different address. ${CONNECTION} = SSID/UUID, ${BOOT}
# would re-randomize every reboot which breaks DHCP leases.
#
# wifi.cloned-mac-address=stable: actually apply the stable-id to
# the connection MAC. Without this NM uses the permanent hardware
# address even when stable-id is set.
#
# ipv6.ip6-privacy=2: prefer SLAAC temporary addresses over the
# EUI-64 derived from the MAC. Mirrors the kernel sysctl we set in
# 10-cosmic.conf, but NM owns ipv6 on managed connections so the
# sysctl alone isn't enough.
[connection]
wifi.cloned-mac-address=stable
connection.stable-id=${CONNECTION}
ipv6.ip6-privacy=2

[device]
wifi.scan-rand-mac-address=yes
