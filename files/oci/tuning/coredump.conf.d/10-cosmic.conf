# systemd-coredump tuning for the COSMIC bootc image.
#
# Storage=external: cores are written to /var/lib/systemd/coredump/
# rather than journaled inline. Inline (Storage=journal) bloats the
# journal with multi-MB binary blobs and makes `journalctl` slow; with
# our SystemMaxUse=1000M cap it would also evict useful log lines.
# External keeps cores out of the way and lets the journal stay text.
#
# Compress=yes: cores are compressed (zstd) on disk. Modern desktops
# can produce hundreds of MB per crash (Electron apps, the compositor);
# zstd typically gets 5-10x and decompression is transparent to
# coredumpctl.
#
# Retention defaults (MaxUse=10%, KeepFree=15%, MaxFileSize=1G,
# MaxAge=3w) are left as upstream -- they're sensible.

[Coredump]
Storage=external
Compress=yes
