# Sysctl tuning for the COSMIC bootc image.
#
# Conservative cross-cutting bumps borrowed from bazzite + Pop!_OS.
# Each line has a one-line "why" so we can debate / strip later.

# File watchers: ide-style apps (vscode, COSMIC Files, Electron-anything)
# blow past the default 8192 with one big monorepo open.
fs.inotify.max_user_watches=524288
fs.inotify.max_user_instances=8192

# mmap regions: Wine/Proton, modern game engines, sometimes Electron
# need very high vm.max_map_count. The 2^31 setting is the value
# Steam, bazzite and Arch's `sysctl-2.6.32` package have shipped for
# years; no observed downside.
vm.max_map_count=2147483642

# TCP MTU probing: lets the kernel discover path-MTU on links where
# ICMP "frag needed" is filtered (some VPNs, broken middleboxes).
# Cheap; no downside.
net.ipv4.tcp_mtu_probing=1

# (BBR congestion control would go here, but fdsdk's kernel doesn't
# build CONFIG_TCP_CONG_BBR -- only `reno` and `cubic` are available.
# Re-add `net.ipv4.tcp_congestion_control=bbr` once fdsdk ships it.)

# IPv6 privacy extensions: prefer temporary addresses over the
# stable EUI-64 derived from the MAC, so passive observers can't
# fingerprint the machine across networks. RFC 4941.
net.ipv6.conf.all.use_tempaddr=2
net.ipv6.conf.default.use_tempaddr=2
