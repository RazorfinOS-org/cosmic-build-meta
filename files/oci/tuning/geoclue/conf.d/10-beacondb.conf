# Point GeoClue's WiFi backend at BeaconDB.
#
# Mozilla Location Service shut down 2024-06; GeoClue's compiled-in
# default URL still points at MLS and now silently returns no fix.
# BeaconDB (https://beacondb.net) is the community-run successor,
# wire-compatible with the MLS / Ichnaea geolocation API, run by
# the same people who maintain Tower Collector.
#
# Without this, anything that asks org.freedesktop.GeoClue2 for a
# WiFi-based fix -- cosmic-applets weather, Firefox's location
# permission, automatic timezone -- gets nothing back. Arch,
# Alpine, NixOS, and Ubuntu 25.04 ship the same patch.
#
# This is /etc/ rather than /usr/lib/ because GeoClue's drop-in
# search path is /etc/geoclue/conf.d/ across all the versions we
# care about; bootc treats baked-in /etc files as the image
# baseline and 3-way-merges any user edits on top.
[wifi]
url=https://api.beacondb.net/v1/geolocate
submit-url=https://api.beacondb.net/v2/geosubmit
