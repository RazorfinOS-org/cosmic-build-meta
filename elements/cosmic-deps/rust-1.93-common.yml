# Shared install logic for the rust 1.93 prebuilt-binary override.
# Each rust-1.93-<arch>.bst includes this file and adds the per-arch
# tarball as a source.
#
# The official rust-lang.org binary tarballs ship as an extracted tree
# with a top-level install.sh that lays out rustc/cargo/rust-std into a
# given prefix. We skip rust-docs to keep the install small; everything
# else (cargo, rustfmt, clippy, llvm-tools, rust-analysis,
# rust-analyzer-preview) is left in so cosmic build scripts that invoke
# them won't trip on a missing component.

build-depends:
- freedesktop-sdk.bst:public-stacks/runtime-minimal.bst
- freedesktop-sdk.bst:bootstrap/grep.bst
- freedesktop-sdk.bst:bootstrap/sed.bst

depends:
- freedesktop-sdk.bst:public-stacks/runtime-minimal.bst

config:
  install-commands:
  - |
    bash install.sh \
      --prefix="%{prefix}" \
      --destdir="%{install-root}" \
      --without=rust-docs \
      --disable-ldconfig

  # Skip the strip pass: prebuilt rustc/cargo are already stripped, and
  # debuginfo handling on rustlib tends to upset BST's dwz step.
  strip-commands: []

public:
  bst:
    split-rules:
      devel:
        (>):
        - '%{bindir}/*'
        # fdsdk's indep-libdir resolves to %{prefix}/lib; hardcoding
        # here to avoid referencing the junction-private variable from
        # outside the junction's element scope.
        - '%{prefix}/lib/rustlib'
        - '%{prefix}/lib/rustlib/**'
